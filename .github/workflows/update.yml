name: Update my-hacker-news

on:
  schedule:
    # 06:00 and 18:00 America/Tijuana while on PDT (UTC-7)
    # Note: GitHub Actions cron is UTC and does not auto-adjust for DST changes.
    - cron: "0 13 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/build_hacker_news.py

      - name: Commit updated site snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add index.html data/latest.json archive/
            git commit -m "chore: update hacker news snapshot"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp index.html site/index.html
          cp -R archive site/archive || true
          cp -R data site/data || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-commit
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
